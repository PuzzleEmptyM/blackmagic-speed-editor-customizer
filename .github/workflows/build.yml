name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub Actions tab

jobs:

  # ---------------------------------------------------------------------------
  # Windows — produces SpeedEditorCustomizer-Windows.zip
  # ---------------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install PyQt6 hidapi pynput pywin32 obsws-python pycaw screen-brightness-control keyring requests pyinstaller pyinstaller-hooks-contrib

      - name: Build
        run: python -m PyInstaller build.spec --clean

      - name: Zip build
        run: cd dist && Compress-Archive -Path SpeedEditorCustomizer -DestinationPath SpeedEditorCustomizer-Windows.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpeedEditorCustomizer-Windows
          path: dist/SpeedEditorCustomizer-Windows.zip

  # ---------------------------------------------------------------------------
  # macOS Apple Silicon — arm64, native on M1/M2/M3 Macs
  # ---------------------------------------------------------------------------
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install PyQt6 hidapi pynput obsws-python screen-brightness-control keyring requests pyinstaller pyinstaller-hooks-contrib

      - name: Build
        env:
          MACOSX_DEPLOYMENT_TARGET: '12.0'
        run: python -m PyInstaller build.spec --clean

      - name: Sign .app bundle (ad-hoc)
        run: codesign --force --deep --sign - dist/SpeedEditorCustomizer.app

      - name: Zip .app bundle
        run: cd dist && zip -r SpeedEditorCustomizer-macOS-AppleSilicon.zip SpeedEditorCustomizer.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpeedEditorCustomizer-macOS-AppleSilicon
          path: dist/SpeedEditorCustomizer-macOS-AppleSilicon.zip

  # ---------------------------------------------------------------------------
  # macOS Intel — x86_64, built via Rosetta 2 on the arm64 runner
  # ---------------------------------------------------------------------------
  build-macos-intel:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install universal2 Python 3.12 (for x86_64 slice)
        run: |
          curl -fsSL -o /tmp/python312.pkg \
            "https://www.python.org/ftp/python/3.12.9/python-3.12.9-macos11.pkg"
          sudo installer -pkg /tmp/python312.pkg -target /

      - name: Install dependencies (x86_64 via Rosetta 2)
        run: |
          arch -x86_64 /Library/Frameworks/Python.framework/Versions/3.12/bin/python3 -m pip install \
            PyQt6 hidapi pynput obsws-python screen-brightness-control keyring requests pyinstaller pyinstaller-hooks-contrib

      - name: Build (x86_64 / Intel)
        env:
          MACOSX_DEPLOYMENT_TARGET: '12.0'
        run: |
          arch -x86_64 /Library/Frameworks/Python.framework/Versions/3.12/bin/python3 -m PyInstaller build.spec --clean

      - name: Sign .app bundle (ad-hoc)
        run: codesign --force --deep --sign - dist/SpeedEditorCustomizer.app

      - name: Zip .app bundle
        run: cd dist && zip -r SpeedEditorCustomizer-macOS-Intel.zip SpeedEditorCustomizer.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpeedEditorCustomizer-macOS-Intel
          path: dist/SpeedEditorCustomizer-macOS-Intel.zip

  # ---------------------------------------------------------------------------
  # Release — runs after all three builds, publishes to "Latest" release
  # ---------------------------------------------------------------------------
  release:
    needs: [build-windows, build-macos-arm64, build-macos-intel]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: SpeedEditorCustomizer-Windows
          path: artifacts/

      - name: Download macOS Apple Silicon build
        uses: actions/download-artifact@v4
        with:
          name: SpeedEditorCustomizer-macOS-AppleSilicon
          path: artifacts/

      - name: Download macOS Intel build
        uses: actions/download-artifact@v4
        with:
          name: SpeedEditorCustomizer-macOS-Intel
          path: artifacts/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: Automatically built from the latest commit on main.
          prerelease: false
          make_latest: true
          files: |
            artifacts/SpeedEditorCustomizer-Windows.zip
            artifacts/SpeedEditorCustomizer-macOS-AppleSilicon.zip
            artifacts/SpeedEditorCustomizer-macOS-Intel.zip
